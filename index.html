<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for archiey</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at 30% 40%, #2d1b36, #0d0812);
font-family:'Segoe UI',sans-serif;
color:white;
overflow:hidden;
}

.stars,
.hearts{
position:fixed;
inset:0;
pointer-events:none;
}

.star{
position:absolute;
background:#ffb3d9;
border-radius:50%;
animation:twinkle var(--d) infinite alternate;
}

@keyframes twinkle{
from{
opacity:.1;
transform:scale(.6);
}
to{
opacity:.9;
transform:scale(1.3);
}
}

.heart{
position:absolute;
color:#ff9fcf;
animation:floatUp linear forwards;
}

@keyframes floatUp{
to{
transform:translateY(-120vh);
opacity:0;
}
}

.photobox{
width:95%;
max-width:550px;
padding:24px;
border-radius:30px;
background:rgba(25,15,30,.92);
backdrop-filter:blur(18px);
box-shadow:0 30px 80px rgba(180,60,120,.25);
}

.header{
text-align:center;
margin-bottom:12px;
}

.header h1{
background:linear-gradient(135deg,#ff99cc,#ff6699,#ff99cc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:4px;
font-size:1.4rem;
}

.frame{
width:100%;
aspect-ratio:4/5;
max-height:420px;
padding:8px;
border-radius:22px;
overflow:hidden;
background:#150d1a;
box-shadow:
0 0 20px rgba(255,100,180,.2),
inset 0 0 30px rgba(0,0,0,.7);
}

.frame img{
width:100%;
height:100%;
object-fit:cover;
border-radius:16px;
animation:cuteFloat 4s ease-in-out infinite;
}

@keyframes cuteFloat{
50%{
transform:translateY(-6px);
}
}

.cute-text{
text-align:center;
margin:12px 0;
color:#ffb3d9;
font-size:.95rem;
}

.counter{
text-align:center;
margin-bottom:12px;
color:#ffd4e8;
}

.nav{
display:flex;
gap:10px;
margin-top:12px;
}

.nav button{
flex:1;
border:none;
padding:12px;
border-radius:999px;
color:white;
cursor:pointer;
background:linear-gradient(135deg,#ff7eb6,#ffb3d9);
font-weight:600;
}

.nav button:hover{
transform:translateY(-2px);
}

.music-player{
margin-top:15px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:12px;
border-radius:18px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
}

.music-info{
margin-bottom:8px;
color:#ffb3d9;
font-size:.8rem;
letter-spacing:1px;
}

.music-player audio{
width:100%;
max-width:280px;
}
</style></head><body><div class="stars" id="stars"></div>
<div class="hearts" id="hearts"></div><div class="photobox"><div class="header">
<h1>archiey sayang</h1>
</div><div class="frame">
<img id="photoDisplay" src="">
</div><div class="cute-text">
for someone special ♡
</div><div class="counter">
<span id="current">1</span> /
<span id="total">4</span>
</div><div class="nav">
<button id="prevBtn">Back</button>
<button id="nextBtn">Next</button>
</div><div class="music-player">
<div class="music-info">
♪ Playing
</div><audio controls loop>
<source src="https://files.catbox.moe/0i7exx.mp3" type="audio/mpeg">
</audio>
</div></div><script>

const photoList=[
{url:"https://files.catbox.moe/trqxky.jpg"},
{url:"https://files.catbox.moe/6m7tke.jpg"},
{url:"https://files.catbox.moe/6kzcbd.jpg"},
{url:"https://files.catbox.moe/9rgrjj.jpg"}
];

let current=0;

const img=document.getElementById('photoDisplay');
const currentEl=document.getElementById('current');
const totalEl=document.getElementById('total');

totalEl.textContent=photoList.length;

function showPhoto(index){
img.src=photoList[index].url;
currentEl.textContent=index+1;
}

showPhoto(0);

document.getElementById('prevBtn').onclick=()=>{
current=(current-1+photoList.length)%photoList.length;
showPhoto(current);
};

document.getElementById('nextBtn').onclick=()=>{
current=(current+1)%photoList.length;
showPhoto(current);
};

for(let i=0;i<70;i++){

const s=document.createElement('div');

s.className='star';

const z=Math.random()*3+1;

s.style.width=z+'px';
s.style.height=z+'px';

s.style.left=Math.random()*100+'%';
s.style.top=Math.random()*100+'%';

s.style.setProperty(
'--d',
(Math.random()*3+2)+'s'
);

document.getElementById('stars').appendChild(s);
}

setInterval(()=>{

const h=document.createElement('div');

h.className='heart';
h.innerHTML='♡';

h.style.left=Math.random()*100+'vw';
h.style.bottom='-20px';

h.style.fontSize=(Math.random()*15+15)+'px';

h.style.animationDuration=
(Math.random()*4+5)+'s';

document.getElementById('hearts').appendChild(h);

setTimeout(()=>{
h.remove();
},9000);

},500);

</script></body>
  </html>
